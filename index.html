<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MangaKu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

  <header>
    <h1>📖 MangaKu</h1>
    <button id="toggleTheme">☀️ Light</button>
  </header>

  <main>
    <section id="searchSection">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Cari manga..."/>
        <button id="searchBtn">Cari</button>
      </div>
      <div id="genreFilter">
        <p class="filter-label">Filter Genre:</p>
        <div id="genreTags"></div>
      </div>
    </section>

    <section id="results"></section>

    <section id="chapterList" class="hidden">
      <button id="backToSearch">← Kembali</button>
      <div class="manga-detail">
        <img id="mangaCover" src="" alt="cover"/>
        <div class="manga-meta">
          <h2 id="mangaTitle"></h2>
          <div id="mangaGenres"></div>
          <p id="mangaDesc"></p>
        </div>
      </div>
      <div id="chapters"></div>
      <div id="recommendations">
        <h3 class="section-title">📚 Rekomendasi Serupa</h3>
        <div id="recGrid" class="card-grid"></div>
      </div>
    </section>

    <section id="readerSection" class="hidden">
      <button id="backToChapters">← Chapter List</button>
      <h3 id="chapterTitle"></h3>
      <div id="pages"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
