<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MangaKu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

  <header>
    <h1>📖 MangaKu</h1>
    <button id="toggleTheme">☀️ Light</button>
  </header>

  <!-- Halaman Utama -->
  <section id="homePage">
    <div class="search-wrap">
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Cari manga..."/>
        <button id="searchBtn">Cari</button>
      </div>
      <div id="genreFilter">
        <p class="filter-label">Filter Genre:</p>
        <div id="genreTags"></div>
      </div>
    </div>
    <div id="results"></div>
  </section>

  <!-- Halaman Detail Manga -->
  <section id="detailPage" class="hidden">
    <div class="detail-header">
      <button id="backToHome">← Kembali</button>
    </div>
    <div class="manga-hero">
      <img id="mangaCover" src="" alt="cover"/>
      <div class="manga-meta">
        <h2 id="mangaTitle"></h2>
        <div id="mangaGenres"></div>
        <p id="mangaDesc"></p>
        <div class="lang-switch">
          <button id="btnLangId" class="lang-active">🇮🇩 Indonesia</button>
          <button id="btnLangEn">🇬🇧 English</button>
        </div>
      </div>
    </div>
    <div id="chapters"></div>
    <div id="recommendations">
      <h3 class="section-title">📚 Rekomendasi Serupa</h3>
      <div id="recGrid" class="card-grid"></div>
    </div>
  </section>

  <!-- Halaman Reader -->
  <section id="readerPage" class="hidden">
    <div class="reader-header">
      <button id="backToDetail">← Chapter List</button>
      <span id="chapterTitle"></span>
    </div>
    <div id="pages"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
